name: CDC_Audit_Timeline_Service

services:
  postgres:
    image: postgres:17
    env_file:
      - postgres.env
    ports:
      - "5434:5432"
    volumes: 
      - postgres_data:/var/lib/postgresql/data
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_wal_senders=10
      - -c
      - max_replication_slots=10
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  kafka:
    image: apache/kafka:4.3.0
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1

      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_LISTENERS: INTERNAL://:9092,EXTERNAL://:29092,CONTROLLER://:9093

      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:29092

      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT

      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  debezium:
    image: debezium/connect:2.7.3.Final
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      BOOTSTRAP_SERVERS: kafka:9092

      GROUP_ID: cdc-audit-connect

      CONFIG_STORAGE_TOPIC: connect_configs
      OFFSET_STORAGE_TOPIC: connect_offsets
      STATUS_STORAGE_TOPIC: connect_statuses

      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8083/connectors >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  debezium-connector:
    image: curlimages/curl:8.8.0
    depends_on:
      debezium:
        condition: service_healthy
    command:
      - sh
      - -c
      - |
        curl -fsS -X PUT http://debezium:8083/connectors/postgres-cdc-connector/config \
          -H "Content-Type: application/json" \
          -d '{
            "connector.class": "io.debezium.connector.postgresql.PostgresConnector",
            "database.hostname": "postgres",
            "database.port": "5432",
            "database.user": "debezium",
            "database.password": "debezium",
            "database.dbname": "cdc_audit_timeline_service",
            "topic.prefix": "cdc",
            "plugin.name": "pgoutput",
            "publication.name": "dbz_publication",
            "slot.name": "debezium_slot",
            "table.include.list": "public.users,public.subscriptions"
          }'
    restart: "no"

  api:
    build:
      context: .
      dockerfile: deployment/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./.env
    environment:
      PORT: ":8000"
      DB_HOST: postgres
      DB_PORT: "5432"
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPICS: cdc.public.users,cdc.public.subscriptions
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    command: ["./api"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/api/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  consumer:
    build:
      context: .
      dockerfile: deployment/Dockerfile
    env_file:
      - ./.env
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPICS: cdc.public.users,cdc.public.subscriptions
      KAFKA_GROUP_ID: cdc-audit-consumer
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      debezium-connector:
        condition: service_completed_successfully
    restart: unless-stopped
    command: ["./consumer"]
    healthcheck:
      test: ["CMD-SHELL", "pidof consumer >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
  
volumes:
  postgres_data:
