name: CDC_Audit_Timeline_Service

services:
  postgres:
    image: postgres:17
    env_file:
      - postgres.env
    ports:
      - "5434:5432"
    volumes: 
      - postgres_data:/var/lib/postgresql/data

  server:
    build:
      context: .
      dockerfile: deployment/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./.env
    depends_on:
      - postgres
    restart: unless-stopped
  
volumes:
  postgres_data:
